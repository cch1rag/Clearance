name: Clearance
options:
  bundleIdPrefix: in.lucidlabs
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

attributes:
  LastUpgradeCheck: "1500"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: "NO"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  Clearance:
    type: application
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: Clearance
        excludes:
          - Resources/**
          - Info.plist
    resources:
      - path: Clearance/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.lucidlabs.clearance
        INFOPLIST_FILE: Clearance/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
